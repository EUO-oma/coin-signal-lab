<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Signal Lab</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Coin Signal Lab</h1>
      <p class="muted">투자 조언 아님 · 지표 기반 시나리오 대시보드</p>
      <p id="dataSource" class="muted">데이터 소스: -</p>
    </header>

    <section class="controls card">
      <label>코인
        <select id="symbol"></select>
      </label>
      <button id="refreshBtn">새로고침</button>
      <label class="muted"><input type="checkbox" id="autoRefresh" checked /> 자동 새로고침</label>
      <span id="countdown" class="muted">30s</span>
      <button id="openSettingsBtn">설정</button>
    </section>

    <section class="card" id="settingsPanel" hidden>
      <h3>설정</h3>
      <label>코인 목록(콤마 구분)
        <input id="settingsSymbols" placeholder="BTCUSDT,ETHUSDT,SOLUSDT" />
      </label>
      <label>기본 타임프레임
        <select id="settingsTf">
          <option value="15m">15m</option>
          <option value="1h">1h</option>
          <option value="4h">4h</option>
          <option value="1d">1d</option>
        </select>
      </label>
      <label>자동 새로고침 간격(초)
        <input id="settingsInterval" type="number" min="1" max="300" step="1" value="1" />
      </label>
      <div class="controls">
        <button id="saveSettingsBtn">저장</button>
        <button id="closeSettingsBtn">닫기</button>
      </div>
    </section>

    <section class="grid">
      <article class="card"><h3>현재가</h3><p id="price">-</p></article>
      <article class="card"><h3>RSI(14)</h3><p id="rsi">-</p></article>
      <article class="card"><h3>MACD</h3><p id="macd">-</p></article>
      <article class="card"><h3>신호 점수</h3><p id="score">-</p></article>
      <article class="card"><h3>포지션 제안</h3><p id="positionAdvice">-</p></article>
      <article class="card"><h3>손절가(참고)</h3><p id="stopPrice">-</p></article>
    </section>

    <section class="card">
      <h3>미니 차트 (기간별)</h3>
      <div class="multi-sparks">
        <div><p class="muted">단기 (30봉)</p><canvas id="spark30" width="820" height="120"></canvas></div>
        <div><p class="muted">중기 (120봉)</p><canvas id="spark120" width="820" height="140"></canvas></div>
        <div><p class="muted">장기 (250봉)</p><canvas id="spark250" width="820" height="160"></canvas></div>
      </div>
    </section>

    <section class="card">
      <h3>24시간 시나리오</h3>
      <ul id="scenario"></ul>
    </section>

    <section class="grid">
      <article class="card">
        <h3>시장 무드</h3>
        <p id="mood">-</p>
      </article>
      <article class="card">
        <h3>시그널 온도계</h3>
        <div class="thermo"><div id="thermoFill"></div></div>
        <p id="thermoText" class="muted">-</p>
      </article>
    </section>

    <section class="card fun">
      <h3>오늘의 한 줄 브리핑</h3>
      <p id="brief">-</p>
    </section>

    <section class="card">
      <h3>관련 코인 최근 뉴스</h3>
      <ul id="newsList"><li class="muted">불러오는 중...</li></ul>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
</body>
</html>
